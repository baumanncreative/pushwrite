<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PushWrite 002A Browser Fixture</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Menlo, Monaco, monospace;
        background: #f5efe3;
        color: #1d1d1d;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(182, 217, 255, 0.55), transparent 30%),
          linear-gradient(180deg, #f5efe3 0%, #f8f7f2 100%);
      }

      main {
        width: min(720px, calc(100vw - 48px));
        padding: 24px;
        border: 1px solid rgba(29, 29, 29, 0.12);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 18px 48px rgba(61, 74, 85, 0.12);
        backdrop-filter: blur(12px);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.4rem;
      }

      p {
        margin: 0 0 16px;
        line-height: 1.5;
      }

      textarea,
      pre {
        width: 100%;
        box-sizing: border-box;
        border-radius: 14px;
        border: 1px solid rgba(29, 29, 29, 0.12);
        padding: 14px 16px;
        font: inherit;
        background: rgba(255, 255, 255, 0.95);
      }

      textarea {
        min-height: 180px;
        resize: vertical;
      }

      pre {
        margin: 16px 0 0;
        min-height: 96px;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>PushWrite 002A Browser Textarea Fixture</h1>
      <p>
        The textarea autofocuses on load. The status block mirrors the current value so the paste
        result can be checked without extra page logic.
      </p>
      <textarea id="target" autofocus spellcheck="false" placeholder="Paste target"></textarea>
      <pre id="status"></pre>
    </main>

    <script>
      const target = document.getElementById("target");
      const status = document.getElementById("status");
      let lastEvent = "initial";

      function focusTarget() {
        target.focus({ preventScroll: true });
        const end = target.value.length;
        target.setSelectionRange(end, end);
      }

      function scheduleFocusBootstrap() {
        [0, 100, 300, 700, 1200].forEach((delay) => {
          window.setTimeout(focusTarget, delay);
        });
      }

      function updateStatus() {
        const payload = {
          lastEvent,
          length: target.value.length,
          value: target.value,
        };

        status.textContent = JSON.stringify(payload, null, 2);
        document.title = `PushWrite 002A Browser Fixture len=${payload.length}`;
        history.replaceState(null, "", `#${encodeURIComponent(payload.value)}`);
      }

      target.addEventListener("input", () => {
        lastEvent = "input";
        updateStatus();
      });

      target.addEventListener("paste", () => {
        lastEvent = "paste";
        setTimeout(updateStatus, 0);
      });

      target.addEventListener("blur", () => {
        window.setTimeout(focusTarget, 0);
      });

      window.addEventListener("focus", () => {
        scheduleFocusBootstrap();
      });

      window.addEventListener("pageshow", () => {
        scheduleFocusBootstrap();
      });

      window.addEventListener("load", () => {
        scheduleFocusBootstrap();
        updateStatus();
      });
    </script>
  </body>
</html>
